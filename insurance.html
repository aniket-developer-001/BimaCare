<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
  body{
    background:#f5f7ff;
    padding-bottom:85px;
    color:#0A1A3C;
  }

  /* ===== Header ===== */
  .topHeader{
    width:100%;
    position:sticky;
    top:0;
    z-index:999;
    background:#0A1A3C;
    padding:10px 14px;
    border-bottom:1px solid rgba(255,255,255,0.12);
  }

  .headerRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }

  .backBtn{
    width:42px;height:42px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.14);
    border:1px solid rgba(255,255,255,0.18);
    color:#fff;
    text-decoration:none;
  }

  .title{
    font-size:17px;
    font-weight:1000;
    color:#fff;
    letter-spacing:0.2px;
  }

  .headerIcon{
    width:42px;height:42px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.14);
    border:1px solid rgba(255,255,255,0.18);
    color:#fff;
  }

  /* ===== Search ===== */
  .searchWrap{
    margin-top:12px;
    display:flex;
    gap:10px;
  }

  .searchBox{
    flex:1;
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 12px;
    border-radius:16px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
    color:#fff;
  }

  .searchBox i{opacity:0.9;}

  .searchBox input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    color:#fff;
    font-size:14px;
    font-weight:850;
  }

  .searchBox input::placeholder{
    color:rgba(255,255,255,0.75);
    font-weight:800;
  }

  /* ===== Filter + Sort ===== */
  .controls{
    padding:14px 14px 0;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .controlBox{
    flex:1;
    min-width:160px;
    background:#fff;
    border-radius:16px;
    padding:12px;
    border:1px solid rgba(0,0,0,0.06);
    box-shadow:0 12px 28px rgba(0,0,0,0.05);
  }

  .controlBox label{
    display:block;
    font-size:12px;
    font-weight:950;
    color:#0A1A3C;
    margin-bottom:6px;
  }

  select{
    width:100%;
    border:none;
    outline:none;
    font-size:13.5px;
    font-weight:900;
    color:#0A1A3C;
    background:transparent;
  }

  /* ===== List ===== */
  .list{
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:14px;
    max-width:820px;
    margin:auto;
  }

  .plan{
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    border:1px solid rgba(0,0,0,0.06);
    box-shadow:0 16px 40px rgba(0,0,0,0.06);
    cursor:pointer;
    transition:0.2s;
  }

  .plan:active{transform:scale(0.995);}

  .planImg{
    width:100%;
    height:160px;
    object-fit:cover;
    display:block;
  }

  .planBody{
    padding:14px;
  }

  .planTitleRow{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }

  .planTitle{
    font-size:16px;
    font-weight:1000;
    color:#0A1A3C;
    line-height:1.2;
  }

  .viewBtn{
    border:none;
    outline:none;
    cursor:pointer;
    padding:10px 12px;
    border-radius:14px;
    font-size:12px;
    font-weight:1000;
    background:#eef2ff;
    color:#2563eb;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .meta{
    margin-top:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .pill{
    padding:9px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:950;
    background:#f6f8ff;
    border:1px solid rgba(37,99,235,0.12);
    color:#0A1A3C;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .desc{
    margin-top:10px;
    font-size:13px;
    font-weight:800;
    color:#2c3a57;
    line-height:1.55;
  }

  .tags{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  .tag{
    padding:9px 12px;
    border-radius:999px;
    background:#0A1A3C;
    color:#fff;
    font-size:11px;
    font-weight:950;
    display:flex;
    align-items:center;
    gap:8px;
  }

  /* Empty */
  .empty{
    background:#fff;
    border-radius:20px;
    padding:18px;
    border:1px solid rgba(0,0,0,0.06);
    text-align:center;
    font-weight:950;
    color:#374151;
  }
  body.dark #search, body.dark #sort, body.dark #filter{
    background: transparent;
    border: none;
    
  }.plan {
  background: #fff;
  border-radius: 22px;
  overflow: hidden;
  border: 1px solid rgba(0, 0, 0, 0.06);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
  cursor: pointer;
  transition: all .25s ease;
  position: relative;
}

.plan:hover {
  transform: translateY(-5px);
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12);
}

.planImg {
  width: 100%;
  height: 170px;
  object-fit: cover;
}

.planBody {
  padding: 16px;
}

.planTitle {
  font-size: 17px;
  font-weight: 1000;
  margin-bottom: 6px;
}

.meta {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.pill {
  background: #f3f6ff;
  border-radius: 999px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 900;
  border: 1px solid rgba(37, 99, 235, 0.15);
}

.viewBtn {
  margin-top: 12px;
  width: 100%;
  border: none;
  padding: 12px;
  border-radius: 14px;
  background: linear-gradient(135deg, #2563eb, #4f46e5);
  color: #fff;
  font-weight: 900;
  cursor: pointer;
}.plan {
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(0, 0, 0, 0.06);
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
  cursor: pointer;
  transition: 0.25s;
}

.plan:hover {
  transform: translateY(-4px);
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12);
}

.planImg {
  width: 100%;
  height: 170px;
  object-fit: cover;
}

.planBody {
  padding: 16px;
}

.planTitle {
  font-size: 16px;
  font-weight: 1000;
  margin-bottom: 10px;
}

.meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.pill {
  background: #eef2ff;
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 12px;
  font-weight: 900;
  color: #1e3a8a;
}

.desc {
  margin-top: 8px;
  font-size: 13px;
  font-weight: 800;
  color: #374151;
}

.viewBtn {
  margin-top: 12px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 14px;
  background: #2563eb;
  color: #fff;
  font-weight: 900;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
</style>
</head>

<body>

  <!-- HEADER -->
  <header class="topHeader">
    <div class="headerRow">
      <a class="backBtn" href="https://aniket-developer-001.github.io/BimaCare/home.html"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="title">All Insurance</div>
      <div class="headerIcon"><i class="fa-solid fa-shield-heart"></i></div>
    </div>

    <div class="searchWrap">
      <div class="searchBox">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="search" type="text" placeholder="Search insurance..." />
      </div>
    </div>
  </header>

  <!-- FILTER + SORT -->
  <section class="controls">
    <div class="controlBox">
      <label><i class="fa fa-filter"></i> Filter</label>
      <select id="filter">
        <option value="all">All Plans</option>
        <option value="life">Life Insurance</option>
        <option value="health">Health Insurance</option>
        <option value="term">Term Insurance</option>
        <option value="pension">Pension</option>
        <option value="child">Child Plan</option>
      </select>
    </div>

    <div class="controlBox">
      <label><i class="fa fa-arrows-v"></i> Sort</label>
      <select id="sort">
        <option value="popular">Popular</option>
        <option value="premiumLow">Premium Low → High</option>
        <option value="premiumHigh">Premium High → Low</option>
        <option value="interestHigh">Interest High → Low</option>
      </select>
    </div>
  </section>

  <!-- LIST -->
  <main class="list" id="list"></main>
    <nav class="bottomNav">
  <a class="navItem" href="https://aniket-developer-001.github.io/BimaCare/home.html"><i class="fa-solid fa-house"></i><span>Home</span></a>

</nav>
<script src="lic.js"></script>
<script>
/* ===========================
   SIMPLE DARK MODE LOADER
=========================== */

const THEME_KEY = "dark_mode";

function loadThemeFromStorage() {
  
  const mode = localStorage.getItem(THEME_KEY);
  
  if (mode === "yes") {
    document.body.classList.add("dark");
  } else {
    document.body.classList.remove("dark");
  }
  
}

document.addEventListener("DOMContentLoaded", loadThemeFromStorage);


/* ===========================
   PLAN IMAGES
=========================== */

const PLAN_IMAGES = {
  
  844: "https://images.unsplash.com/photo-1554224154-26032ffc0d07?w=1200",
  843: "https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?w=1200",
  845: "https://images.unsplash.com/photo-1560518883-ce09059eeffa?q=80&w=1200&auto=format&fit=crop",
  846: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=1200",
  847: "https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?w=1200",
  848: "https://images.unsplash.com/photo-1580519542036-c47de6196ba5?w=1200"
  
};


/* ===========================
   ELEMENTS
=========================== */

const list = document.getElementById("list");
const search = document.getElementById("search");
const filter = document.getElementById("filter");
const sort = document.getElementById("sort");


/* ===========================
   SELECT PLAN
=========================== */

function selectPlan(plan) {
  
  localStorage.setItem("selected_plan", JSON.stringify(plan));
  
  window.location.href = "view.html";
  
}


/* ===========================
   FORMAT MONEY
=========================== */

function formatINR(num) {
  
  return "₹" + Number(num).toLocaleString("en-IN");
  
}


/* ===========================
   RENDER CARDS
=========================== */

function render() {
  
  let data = [...LIC_PLANS]; // get data from lic.js
  
  const q = search.value.toLowerCase().trim();
  const f = filter.value;
  
  /* SEARCH */
  
  if (q) {
    data = data.filter(plan =>
      (plan.plan_name || "").toLowerCase().includes(q)
    );
  }
  
  /* FILTER */
  
  if (f !== "all") {
    data = data.filter(plan =>
      (plan.plan_type || "").toLowerCase().includes(f)
    );
  }
  
  /* EMPTY */
  
  if (data.length === 0) {
    list.innerHTML = `<div class="empty">No Insurance Found</div>`;
    return;
  }
  
  /* CREATE CARDS */
  
  list.innerHTML = data.map(plan => `

<div class="plan" onclick='selectPlan(${JSON.stringify(plan)})'>

<img class="planImg"
src="${PLAN_IMAGES[plan.plan_number] || 'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=1200'}"
alt="${plan.plan_name}">

<div class="planBody">

<div class="planTitle">
${plan.plan_number} - ${plan.plan_name}
</div>

<div class="meta">

<div class="pill">
<i class="fa-solid fa-chart-line"></i>
Return: ${plan.expected_return}
</div>

<div class="pill">
<i class="fa-solid fa-indian-rupee-sign"></i>
Sum Assured: ₹${Number(plan.minimum_sum_assured).toLocaleString("en-IN")}
</div>

</div>

<div class="desc">
${plan.plan_type} <br>
Entry Age: ${plan.age_entry}
</div>

<button class="viewBtn">
<i class="fa-solid fa-eye"></i> View Details
</button>

</div>

</div>

`).join("");
  
}


/* ===========================
   EVENTS
=========================== */

search.addEventListener("input", render);
filter.addEventListener("change", render);

render();
</script>

</body>
</html>
