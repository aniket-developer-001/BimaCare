<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(135deg,#0f172a,#1e3a8a);

padding:20px;

}


/* CARD */

.box{

width:100%;
max-width:420px;

background:#fff;

padding:30px 20px;

border-radius:24px;

box-shadow:0 30px 70px rgba(0,0,0,0.35);

}


/* TITLE */

.title{

text-align:center;

font-size:22px;
font-weight:900;

margin-bottom:20px;

position:relative;

}

.title::after{

content:"";

width:60px;
height:3px;

background:#2563eb;

display:block;

margin:6px auto 0;

border-radius:10px;

}


/* INPUT */

.field{

margin-bottom:14px;

}

.inputBox{

display:flex;
align-items:center;

border:1px solid #ddd;

border-radius:14px;

padding:12px;

background:#fafafa;

}

.inputBox i{

color:#2563eb;

margin-right:10px;

}

.inputBox input{

border:none;
outline:none;

width:100%;

font-size:14px;

background:transparent;

}


/* ERROR */

.err{

font-size:12px;

color:#e11d48;

margin-top:4px;

display:none;

}


/* BUTTON */

.btn{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:linear-gradient(135deg,#2563eb,#7c3aed);

color:#fff;

font-weight:800;

cursor:pointer;

font-size:15px;

box-shadow:0 15px 35px rgba(37,99,235,0.3);

}

.btn:active{

transform:scale(.98);

}


/* POPUP */

.modalBg{

position:fixed;

inset:0;

background:rgba(0,0,0,0.6);

display:flex;

align-items:center;
justify-content:center;

opacity:0;

pointer-events:none;

transition:.3s;

}

.modalBg.show{

opacity:1;

pointer-events:auto;

}

.modal{

width:90%;
max-width:320px;

background:#fff;

padding:24px;

border-radius:20px;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,0.3);

}

.modal i{

font-size:40px;

margin-bottom:10px;

}

.modal.success i{

color:#22c55e;

}

.modal.error i{

color:#ef4444;

}

.modal h3{

font-size:18px;

margin-bottom:6px;

}

.modal p{

font-size:13px;

color:#555;

}


/* LOADER */

.loader{

width:100%;

height:8px;

background:#eee;

border-radius:10px;

margin-top:12px;

overflow:hidden;

}

.loaderFill{

width:0%;

height:100%;

background:linear-gradient(135deg,#2563eb,#7c3aed);

}

</style>

</head>

<body>


<div class="box">

<div class="title">Create Account</div>


<div class="field">

<div class="inputBox">

<i class="fa fa-user"></i>

<input id="name" type="text" placeholder="Full Name">

</div>

<div class="err" id="nameErr">Enter valid name</div>

</div>


<div class="field">

<div class="inputBox">

<i class="fa fa-phone"></i>

<input id="phone" type="number" placeholder="Phone Number" maxlength="10">

</div>

<div class="err" id="phoneErr">Enter valid 10 digit phone</div>

</div>


<button class="btn" id="createBtn">

Create Account
<i class="fa fa-arrow-circle-right"></i> 
</button>

</div>


<!-- POPUP -->

<div class="modalBg" id="modal">

<div class="modal success" id="modalBox">

<i class="fa fa-circle-check"></i>

<h3 id="modalTitle">Success</h3>

<p id="modalText">Account created</p>

<div class="loader">

<div class="loaderFill" id="loaderFill"></div>

</div>

</div>

</div>


<script>
if (localStorage.getItem("is_logged_in") === "yes") {
  window.location.href = "https://aniket-developer-001.github.io/BimaCare//home.html";
}

const nameInput=document.getElementById("name");

const phoneInput=document.getElementById("phone");

const nameErr=document.getElementById("nameErr");

const phoneErr=document.getElementById("phoneErr");

const modal=document.getElementById("modal");

const modalBox=document.getElementById("modalBox");

const modalTitle=document.getElementById("modalTitle");

const modalText=document.getElementById("modalText");

const loaderFill=document.getElementById("loaderFill");


/* PHONE FILTER */

phoneInput.addEventListener("input",()=>{

phoneInput.value=phoneInput.value.replace(/[^0-9]/g,"");

});


/* VALIDATION */

function validate(){

let ok=true;

if(nameInput.value.trim().length<3){

nameErr.style.display="block";

ok=false;

}

else{

nameErr.style.display="none";

}


if(!/^[0-9]{10}$/.test(phoneInput.value)){

phoneErr.style.display="block";

ok=false;

}

else{

phoneErr.style.display="none";

}


return ok;

}


/* BUTTON CLICK */

document.getElementById("createBtn").onclick=()=>{


if(!validate()){

modal.classList.add("show");

modalBox.className="modal error";

modalTitle.innerText="Invalid Input";

modalText.innerText="Please fill all fields correctly";

loaderFill.style.width="0%";


setTimeout(()=>{

modal.classList.remove("show");

},1000);


return;

}


/* SAVE DATA */

localStorage.setItem("user_name",nameInput.value);

localStorage.setItem("user_phone",phoneInput.value);

localStorage.setItem("is_logged_in","yes");
const STORAGE_KEY = "user_streak_data";

let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
  currentStreak: 0,
  lastCollected: 0,
  completed: false
};
localStorage.setItem("coins",0);
localStorage.setItem("ads",0);
modal.classList.add("show");

modalBox.className="modal success";

modalTitle.innerText="Account Created";

modalText.innerText="Redirecting to Home...";


let progress=0;

let interval=setInterval(()=>{

progress+=20;

loaderFill.style.width=progress+"%";


if(progress>=100){

clearInterval(interval);

window.location.href="https://aniket-developer-001.github.io/BimaCare/home.html";

}

},400);


};


</script>

</body>

</html>
