<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BimaCare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#ffffff;
color:#0A1A3C;
}

.splash{
text-align:center;
width:100%;
max-width:320px;
}

/* LOGO */

.logo{
width:140px;
height:140px;
border-radius:24px;
background:#f5f7ff;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 18px;
box-shadow:0 12px 35px rgba(0,0,0,0.08);
}

.logo img{
width:100%;
border-radius:24px;
}

/* APP NAME */

.appName{
font-size:26px;
font-weight:700;
letter-spacing:.5px;
}

.tag{
font-size:13px;
color:#64748b;
margin-top:5px;
}

/* PROGRESS AREA */

.progressWrap{
margin-top:45px;
width:100%;
}

.progressTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
font-size:12px;
font-weight:600;
color:#64748b;
}

.progressBar{
width:100%;
height:8px;
background:#e6e9ff;
border-radius:20px;
overflow:hidden;
}

.progressFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#2563eb,#4f46e5);
border-radius:20px;
transition:width .25s linear;
box-shadow:0 4px 12px rgba(37,99,235,0.4);
}

.percent{
font-size:12px;
font-weight:700;
color:#2563eb;
}

</style>
</head>

<body>

<div class="splash">

<div class="logo">
<img src="https://aniket-developer-001.github.io/BimaCare/logo.png">
</div>

<div class="appName">BimaCare</div>
<div class="tag">Insurance Tools & Calculator</div>

<div class="progressWrap">

<div class="progressTop">
<span>Loading...</span>
<span class="percent" id="percent">0%</span>
</div>

<div class="progressBar">
<div class="progressFill" id="progressFill"></div>
</div>

</div>

</div>

<script>

/* =====================
   PROGRESS BAR SYSTEM
===================== */

let progress = 0;
const bar = document.getElementById("progressFill");
const percentText = document.getElementById("percent");

const loader = setInterval(()=>{

progress++;

bar.style.width = progress + "%";
percentText.innerText = progress + "%";

if(progress >= 100){

clearInterval(loader);

setTimeout(()=>{

const isLogged = localStorage.getItem("is_logged_in");

if(isLogged === "yes"){
window.location.href="https://aniket-developer-001.github.io/BimaCare//home.html";
}else{
window.location.href="https://aniket-developer-001.github.io/BimaCare//register.html";
}

},400);

}

},30);

</script>

</body>
</html>
